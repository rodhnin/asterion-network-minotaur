# Asterion MULTI-CRED credentials file
# Usage: ast scan --target 10.0.0.1 --creds-file config/credentials.yaml
#
# Flat format (top-level keys — one credential per type):
# auth:      "DOMAIN\username:password"   # NTLM/Kerberos domain authentication
# auth_ntlm: "username:AABBCC112233..."   # Pass-the-hash (NTLM hash)
# kerberos:  "user@DOMAIN.LOCAL:password" # Kerberos ticket request
# ssh:       "username:password"          # SSH login for Linux targets
#
# List format (credentials[] — multiple sets, first applicable one wins):
# credentials:
#   - label: "Domain Admin"
#     auth: "CORP\administrator:P@ssw0rd"
#   - label: "SSH Root"
#     ssh: "root:toor"
#   - label: "NTLM Hash"
#     auth_ntlm: "administrator:AABBCCDDEEFF00112233445566778899"
#
# NOTE: CLI flags (--auth, --auth-ntlm, --ssh, --kerberos) take precedence
# over credentials from this file.

# Example — mixed environment (Windows DC + Linux servers):
auth: "CORP\\administrator:P@ssw0rd1!"
ssh: "root:toor"
kerberos: "administrator@CORP.LOCAL:P@ssw0rd1!"
